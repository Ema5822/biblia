<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Santa Biblia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#0b1020;color:#fff}
h1{text-align:center;margin:10px 0}
.side{
position:fixed;top:0;height:100%;width:220px;
background:#111;transform:translateX(-100%);
transition:0.3s;padding:10px;z-index:1000;
}
.side.right{right:0;left:auto;transform:translateX(100%)}
.side.open{transform:translateX(0)}
button{width:100%;margin:5px 0;padding:10px}
</style>
</head>
<body>

<h1>📖 Mi Santa Biblia</h1>

<div id="left" class="side">
<button onclick="toggleTheme()">🌙/☀️</button>
<button onclick="font(-1)">A-</button>
<button onclick="font(0)">A</button>
<button onclick="font(1)">A+</button>
</div>

<div id="right" class="side right">
<h3>Favoritos</h3>
<div id="fav"></div>
<button onclick="notif()">🔔 Activar</button>
</div>

<script>
let size=16;

function font(n){
if(n===0) size=16;
else size+=n;
document.body.style.fontSize=size+"px";
}

function toggleTheme(){
document.body.style.background=
document.body.style.background=="white"?"#0b1020":"white";
document.body.style.color=
document.body.style.color=="black"?"white":"black";
}

function notif(){
Notification.requestPermission().then(p=>{
if(p==="granted"){
new Notification("Versículo del día","Dios te bendiga 🙏");
}
});
}

// swipe
let startX=0;
document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});
document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX<30 && endX>100){
document.getElementById("left").classList.add("open");
}
if(startX>window.innerWidth-30 && endX<window.innerWidth-100){
document.getElementById("right").classList.add("open");
}
if(Math.abs(endX-startX)<50){
document.querySelectorAll(".side").forEach(s=>s.classList.remove("open"));
}
});
</script>

</body>
</html>
